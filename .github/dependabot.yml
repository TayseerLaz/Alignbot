version: 2
updates:
  # Application + library dependencies. Group security patches into one PR so
  # the team isn't drowning in single-package bumps, but keep major bumps in
  # their own PRs because they often need code follow-up.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Dubai
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    groups:
      security-patches:
        applies-to: security-updates
        update-types:
          - patch
          - minor
      dev-tooling:
        patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "typescript"
        update-types:
          - patch
          - minor
      runtime-deps:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "typescript"
        update-types:
          - patch
    ignore:
      # Prisma majors land with breaking changes to the generated client; pin
      # to manual upgrades so the migration step gets human review.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]

  # Pin the GitHub Actions we use by hash and let Dependabot tell us when a
  # newer commit-pinned tag exists. Keeps third-party action supply-chain
  # exposure small without freezing forever.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Dubai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

  # Docker base images for api / worker / web. Patch-level updates only —
  # node:20-alpine → 20-alpine-3.x bumps come automatically.
  - package-ecosystem: docker
    directory: "/apps/api"
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Dubai }
    open-pull-requests-limit: 2
    labels: [dependencies, docker]
  - package-ecosystem: docker
    directory: "/apps/worker"
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Dubai }
    open-pull-requests-limit: 2
    labels: [dependencies, docker]
  - package-ecosystem: docker
    directory: "/apps/web"
    schedule: { interval: weekly, day: monday, time: "06:00", timezone: Asia/Dubai }
    open-pull-requests-limit: 2
    labels: [dependencies, docker]

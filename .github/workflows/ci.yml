name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aligned
          POSTGRES_PASSWORD: aligned
          POSTGRES_DB: aligned_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aligned -d aligned_test"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned_test
      DIRECT_DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-change-me-in-production-please-32+chars
      JWT_REFRESH_SECRET: test-refresh-secret-change-me-in-production-please-32+chars
      NODE_ENV: test
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

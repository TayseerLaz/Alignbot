name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - id: tag
        run: echo "value=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aligned-api:latest
            ghcr.io/${{ github.repository_owner }}/aligned-api:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aligned-worker:latest
            ghcr.io/${{ github.repository_owner }}/aligned-worker:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aligned-web:latest
            ghcr.io/${{ github.repository_owner }}/aligned-web:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /srv/aligned
            git fetch --all
            git reset --hard origin/main
            export TAG=${{ needs.build-and-push.outputs.tag }}
            export REGISTRY=ghcr.io/${{ github.repository_owner }}
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml --env-file .env.production pull
            # Run migrations once with the api image, against the direct DB url.
            docker compose -f docker-compose.prod.yml --env-file .env.production run --rm api \
              node node_modules/prisma/build/index.js migrate deploy --schema packages/db/prisma/schema.prisma
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
            # Smoke test
            sleep 8
            curl -fsS https://${{ secrets.API_DOMAIN }}/health

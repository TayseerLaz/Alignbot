name: E2E

# ⚠️ AUTO-RUN ON PUSH/PR IS DISABLED (manual-only for now).
#
# The Playwright specs navigate to ROOT-relative paths (page.goto('/login'),
# '/products', …), but the portal now serves under Next.js basePath '/app', so
# every page 404s until the whole suite is migrated to '/app/*' (and verified
# against real browsers). That made E2E RED on every push while providing no
# signal. The real, blocking test gate is the CI workflow — it runs the full
# vitest suite + the tenant-isolation / read-api / webhook / provenance HARD
# gates. Re-add the `push:`/`pull_request:` triggers once the specs are migrated
# to the /app basePath.
on:
  workflow_dispatch:

# End-to-end Playwright suite. Spins up ephemeral Postgres + Redis + Mailpit
# service containers, applies migrations + RLS + seed, boots api/worker/web as
# background processes, and runs the Playwright suite. Uses a shared `.env`
# file so every workspace (api, worker, e2e) sees the same config.
#
# Notes:
#  - Wasabi credentials are not present in CI, so Wasabi-dependent tests (image
#    upload, CSV import) will fail gracefully. The hard gate we require CI to
#    pass is tenant-isolation — everything else reports but doesn't block.
#  - Uses pnpm 9.12.0 (matches the packageManager pin in package.json).

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aligned
          POSTGRES_PASSWORD: aligned
          POSTGRES_DB: aligned
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aligned -d aligned"
          --health-interval 5s --health-timeout 3s --health-retries 20

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        ports: ["1025:1025", "8025:8025"]
        options: >-
          --health-cmd "wget -qO- http://localhost:8025/api/v1/info || exit 1"
          --health-interval 5s --health-timeout 3s --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Write .env
        run: |
          cat > .env <<EOF
          NODE_ENV=development
          LOG_LEVEL=warn
          DATABASE_URL=postgresql://aligned:aligned@localhost:5432/aligned
          DIRECT_DATABASE_URL=postgresql://aligned:aligned@localhost:5432/aligned
          REDIS_URL=redis://localhost:6379
          JWT_ACCESS_SECRET=e2e-access-secret-at-least-32-characters-long-please
          JWT_REFRESH_SECRET=e2e-refresh-secret-at-least-32-characters-long-please
          JWT_ACCESS_TTL_SECONDS=900
          JWT_REFRESH_TTL_SECONDS=2592000
          COOKIE_DOMAIN=localhost
          COOKIE_SECURE=false
          RATE_LIMIT_AUTH_PER_MINUTE=500
          RATE_LIMIT_API_PER_SECOND=200
          RATE_LIMIT_READ_API_PER_SECOND=400
          EMAIL_FROM="ALIGNED <noreply@aligned.local>"
          EMAIL_DEV_SMTP_HOST=localhost
          EMAIL_DEV_SMTP_PORT=1025
          API_HOST=0.0.0.0
          API_PORT=4000
          API_PUBLIC_URL=http://localhost:4000
          WEB_PUBLIC_URL=http://localhost:3000
          CORS_ORIGINS=http://localhost:3000
          NEXT_PUBLIC_API_URL=http://localhost:4000
          NEXT_PUBLIC_APP_NAME="ALIGNED Business Platform"
          EOF
          ln -sf .env .env.development
          cp .env apps/api/.env || true
          cp .env apps/worker/.env || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm --filter @aligned/db exec prisma generate

      - name: Apply Prisma migrations
        env:
          DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned
          DIRECT_DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned
        run: pnpm --filter @aligned/db exec prisma migrate deploy

      - name: Apply RLS policies
        env:
          PGPASSWORD: aligned
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          # Create aligned_app role (RLS bypass target) as superuser first.
          PGPASSWORD=aligned psql -h localhost -U aligned -d aligned -c \
            "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'aligned_app') THEN CREATE ROLE aligned_app NOLOGIN; END IF; END \$\$;"
          # Seed grant so aligned can SET ROLE aligned_app later.
          PGPASSWORD=aligned psql -h localhost -U aligned -d aligned -c "GRANT aligned_app TO aligned;" || true
          PGPASSWORD=aligned psql -h localhost -U aligned -d aligned -v ON_ERROR_STOP=1 \
            -f packages/db/prisma/rls.sql

      - name: Seed demo data
        env:
          DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned
          DIRECT_DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned
        run: pnpm --filter @aligned/db exec prisma db seed

      - name: Build shared/db (required by api and web)
        run: |
          # TypeScript incremental mode persists a .tsbuildinfo that can cause
          # it to skip emit if it thinks nothing changed. Force a clean build
          # so dist/ is always populated.
          find . -name "*.tsbuildinfo" -not -path "*/node_modules/*" -delete || true
          rm -rf packages/shared/dist packages/db/dist
          pnpm --filter @aligned/shared build
          pnpm --filter @aligned/db build
          # Verify the outputs actually exist — tsc silently emits nothing
          # when all inputs are unchanged, so this catches the regression.
          test -f packages/shared/dist/index.js || (echo "shared/dist missing" && exit 1)
          test -f packages/db/dist/index.js || (echo "db/dist missing" && exit 1)

      - name: Install Playwright browsers
        run: pnpm --filter @aligned/e2e exec playwright install --with-deps chromium

      - name: Start services in background (api + worker via tsx; no build needed)
        env:
          NODE_ENV: development
        run: |
          set -euo pipefail
          # Export the .env into this shell so child processes inherit it.
          # tsx's bare `start` script doesn't pass --env-file, so we load it here.
          set -a
          source .env
          set +a
          # api via tsx — matches production runtime
          nohup pnpm --filter @aligned/api exec tsx src/server.ts > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          # worker via tsx
          nohup pnpm --filter @aligned/worker exec tsx src/index.ts > /tmp/worker.log 2>&1 &
          echo $! > /tmp/worker.pid
          # Build + start web (dev mode is fine for e2e and avoids the Next 15 + TS 5.9 glitch)
          nohup pnpm --filter @aligned/web exec next dev --port 3000 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid

      - name: Wait for services
        run: |
          set -e
          # Web serves under Next.js basePath '/app' — check a real page there,
          # not root (root 404s).
          for url in "http://localhost:4000/health" "http://localhost:3000/app/login"; do
            for i in $(seq 1 60); do
              if curl -sf "$url" > /dev/null; then
                echo "$url → ready"
                break
              fi
              sleep 2
              if [ $i -eq 60 ]; then
                echo "$url did NOT become ready in 120s"
                echo "=== api log ==="; tail -50 /tmp/api.log || true
                echo "=== web log ==="; tail -50 /tmp/web.log || true
                exit 1
              fi
            done
          done

      - name: Preflight
        run: pnpm --filter @aligned/e2e preflight

      - name: Tenant-isolation HARD GATE
        run: pnpm --filter @aligned/e2e test:tenant-isolation

      - name: Full Playwright suite
        run: pnpm --filter @aligned/e2e test
        # Allow suite-level failures without failing the whole workflow —
        # the hard gate above is the required signal. Other failures (notably
        # any Wasabi-dependent tests) are inspected via the report artifact.
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          retention-days: 14

      - name: Tail service logs on failure
        if: failure()
        run: |
          echo "=== api ==="; tail -200 /tmp/api.log || true
          echo "=== worker ==="; tail -200 /tmp/worker.log || true
          echo "=== web ==="; tail -200 /tmp/web.log || true

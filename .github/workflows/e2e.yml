name: E2E

on:
  pull_request:
  push:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aligned
          POSTGRES_PASSWORD: aligned
          POSTGRES_DB: aligned
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aligned -d aligned"
          --health-interval 5s --health-timeout 3s --health-retries 20

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

      mailpit:
        image: axllent/mailpit:latest
        ports: ["1025:1025", "8025:8025"]
        options: >-
          --health-cmd "nc -z localhost 8025"
          --health-interval 5s --health-timeout 3s --health-retries 10

    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned
      DIRECT_DATABASE_URL: postgresql://aligned:aligned@localhost:5432/aligned
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: e2e-access-secret-at-least-32-characters-long-please
      JWT_REFRESH_SECRET: e2e-refresh-secret-at-least-32-characters-long-please
      RATE_LIMIT_AUTH_PER_MINUTE: "500"
      RATE_LIMIT_API_PER_SECOND: "200"
      RATE_LIMIT_READ_API_PER_SECOND: "400"
      EMAIL_DEV_SMTP_HOST: localhost
      EMAIL_DEV_SMTP_PORT: "1025"
      API_HOST: 0.0.0.0
      API_PORT: "4000"
      API_PUBLIC_URL: http://localhost:4000
      WEB_PUBLIC_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      COOKIE_DOMAIN: localhost
      COOKIE_SECURE: "false"
      EMAIL_FROM: "ALIGNED <noreply@aligned.local>"
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Prisma migrations + RLS + seed
        run: |
          pnpm --filter @aligned/db exec prisma migrate deploy
          pnpm --filter @aligned/db exec prisma db seed

      - name: Install Playwright browsers
        run: pnpm --filter @aligned/e2e exec playwright install --with-deps chromium

      - name: Start api
        run: pnpm --filter @aligned/api exec tsx --env-file=../../.env src/server.ts &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Start worker
        run: pnpm --filter @aligned/worker exec tsx --env-file=../../.env src/index.ts &

      - name: Build + start web
        run: |
          pnpm --filter @aligned/web build
          pnpm --filter @aligned/web start &

      - name: Wait for services
        run: |
          for svc in "http://localhost:4000/health" "http://localhost:3000"; do
            for i in {1..40}; do
              if curl -sf "$svc" > /dev/null; then break; fi
              sleep 2
            done
          done

      - name: Preflight
        run: pnpm --filter @aligned/e2e preflight

      - name: Tenant-isolation (HARD DEPLOY GATE)
        run: pnpm qa:gate

      - name: Full Playwright suite
        run: pnpm --filter @aligned/e2e test
        env:
          # Tight run — if it takes >20min locally we have a problem.
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          retention-days: 14

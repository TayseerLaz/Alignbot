<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · Hader AI</title>
    <meta name="theme-color" content="#360516" />
    <link rel="icon" href="/app/icons/icon-32.png" type="image/png" />
    <link rel="apple-touch-icon" href="/app/icons/apple-touch-icon.png" />
    <style>
      :root {
        --bg: #faf9f5;
        --fg: #0a0b0e;
        --muted: #6f5f48;
        --brand: #360516;
        --on-brand: #ffffff;
        --card: #ffffff;
        --border: #e5d8c1;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0b0e;
          --fg: #faf9f5;
          --muted: #cfc0a9;
          --brand: #b87a8d;
          --on-brand: #110108;
          --card: #15161a;
          --border: #25030f;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 40px 32px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        margin: 0 auto 24px;
        display: block;
      }
      h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px; letter-spacing: -0.01em; }
      p { font-size: 15px; line-height: 1.55; color: var(--muted); margin: 0 0 28px; }
      button {
        appearance: none;
        border: none;
        cursor: pointer;
        background: var(--brand);
        color: var(--on-brand);
        font: inherit;
        font-weight: 600;
        font-size: 15px;
        padding: 12px 22px;
        border-radius: 12px;
        transition: opacity 0.15s ease;
      }
      button:hover { opacity: 0.9; }
      .hint { margin-top: 22px; font-size: 13px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/app/icons/icon-192.png" alt="Hader AI" />
      <h1>You're offline</h1>
      <p>
        Hader couldn't reach the network. Your installed app still works — check
        your connection and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
      <div class="hint" id="status">Waiting for a connection…</div>
    </div>
    <script>
      // Auto-recover the moment the browser regains connectivity.
      window.addEventListener('online', function () {
        document.getElementById('status').textContent = 'Back online — reloading…';
        location.reload();
      });
    </script>
  </body>
</html>

# Production stack. Run on Aligned Cloud Server with:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans
#
# - api + worker + web each scaled to 2 replicas behind Caddy.
# - Postgres + Redis stay single-instance for v1; promote to managed if needed.
# - Caddy auto-issues TLS for the configured domains via Let's Encrypt.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - aligned-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "2000"
      DEFAULT_POOL_SIZE: "50"
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - aligned-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    image: ${REGISTRY}/aligned-api:${TAG:-latest}
    restart: unless-stopped
    env_file: [.env.production]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      pgbouncer: { condition: service_started }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2

  worker:
    image: ${REGISTRY}/aligned-worker:${TAG:-latest}
    restart: unless-stopped
    env_file: [.env.production]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?pgbouncer=true
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      pgbouncer: { condition: service_started }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2

  web:
    image: ${REGISTRY}/aligned-web:${TAG:-latest}
    restart: unless-stopped
    env_file: [.env.production]
    deploy:
      replicas: 2

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - aligned-caddy-data:/data
      - aligned-caddy-config:/config
    depends_on: [api, web]

volumes:
  aligned-postgres:
  aligned-redis:
  aligned-caddy-data:
  aligned-caddy-config:

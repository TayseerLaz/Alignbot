# Dev stack only. Production stack lives in docker-compose.prod.yml (Day 4).
services:
  postgres:
    image: postgres:16-alpine
    container_name: aligned-postgres
    environment:
      POSTGRES_USER: aligned
      POSTGRES_PASSWORD: aligned
      POSTGRES_DB: aligned
    ports:
      - "5432:5432"
    volumes:
      - aligned-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aligned -d aligned"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: aligned-pgbouncer
    environment:
      DB_USER: aligned
      DB_PASSWORD: aligned
      DB_HOST: postgres
      DB_NAME: aligned
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: aligned-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - aligned-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: aligned-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  aligned-postgres:
  aligned-redis:

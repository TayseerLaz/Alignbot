# HAProxy — single stable :5432 endpoint that ALWAYS points at the current
# Patroni leader. PgBouncer (and thus the app's DATABASE_URL) connects here, so
# a failover is transparent to the app: HAProxy health-checks Patroni's REST API
# (/leader returns 200 only on the leader) and reroutes within ~2 s.
#
# Run HAProxy on the app nodes (next to PgBouncer) OR on a small dedicated LB.
# DATABASE_URL host → this HAProxy; PgBouncer → HAProxy :5432.

global
    maxconn 2000
    log /dev/log local0

defaults
    log global
    mode tcp
    retries 2
    timeout connect 5s
    timeout client  30m       # long-lived pooled connections
    timeout server  30m
    timeout check   3s

# Primary (read-write): only the node whose Patroni /leader returns 200.
listen postgres-primary
    bind *:5432
    option httpchk GET /leader
    http-check expect status 200
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
    server vm-db-1 <VM_DB_1_IP>:5432 maxconn 1000 check port 8008
    server vm-db-2 <VM_DB_2_IP>:5432 maxconn 1000 check port 8008

# OPTIONAL read-only pool (replicas): point the read API / analytics here to
# offload the primary. /replica returns 200 only on hot standbys.
listen postgres-replicas
    bind *:5433
    option httpchk GET /replica
    http-check expect status 200
    balance roundrobin
    default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
    server vm-db-1 <VM_DB_1_IP>:5432 maxconn 1000 check port 8008
    server vm-db-2 <VM_DB_2_IP>:5432 maxconn 1000 check port 8008

# HAProxy stats (optional): http://<lb>:7000/  — scrape with prometheus too.
listen stats
    bind *:7000
    mode http
    stats enable
    stats uri /
    stats refresh 5s

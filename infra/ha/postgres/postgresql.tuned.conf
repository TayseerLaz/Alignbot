# Postgres 16 tuning for a dedicated DB node (8 vCPU / 32 GB RAM / NVMe).
# Drop-in: include from postgresql.conf, or let Patroni manage these (see
# patroni.yml → postgresql.parameters, which is the source of truth in an HA
# cluster). Values are a sane big-data starting point — tune with real metrics.
#
# Sizing rules of thumb used here (for 32 GB RAM):
#   shared_buffers       ≈ 25% RAM
#   effective_cache_size ≈ 75% RAM
#   maintenance_work_mem ≈ up to 2 GB
#   work_mem    = conservative; it's PER sort/hash node, multiplied by concurrency

# ---- memory ----------------------------------------------------------------
shared_buffers = 8GB
effective_cache_size = 24GB
maintenance_work_mem = 2GB
work_mem = 32MB                      # raise cautiously; N connections × M nodes
huge_pages = try

# ---- WAL / replication / PITR ---------------------------------------------
wal_level = replica                  # already set on the current box
archive_mode = on                    # REQUIRES a restart to turn on (one window)
archive_command = 'wal-g wal-push %p'   # see walg.README.md
archive_timeout = 60                 # bound RPO: force a WAL segment at least /min
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
wal_keep_size = 2GB                   # backstop if a standby briefly lags
wal_compression = on
# Synchronous standby = zero data loss on failover. Patroni manages the name;
# leave commented until the standby is healthy, then enable via Patroni.
# synchronous_standby_names = '*'

# ---- planner / IO (NVMe) ---------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

# ---- parallelism (8 cores) ------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# ---- connections (PgBouncer fronts this; keep backend conns modest) -------
max_connections = 200

# ---- autovacuum: high-churn tables (messages, provenance, recipients) -----
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05    # vacuum sooner on big tables
autovacuum_analyze_scale_factor = 0.02

# ---- observability ---------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
track_io_timing = on
log_min_duration_statement = 1000        # log slow (>1s) queries
log_checkpoints = on
log_lock_waits = on
log_autovacuum_min_duration = 0

# Redis drop-in for HA (primary + replica). Same file on both nodes; on the
# REPLICA also set `replicaof <PRIMARY_IP> 6379`. Sentinel handles promotion, so
# do NOT hardcode roles beyond the initial replicaof.

bind 127.0.0.1 <THIS_NODE_PRIVATE_IP>
protected-mode yes
port 6379
requirepass <REDIS_PASSWORD>
masterauth <REDIS_PASSWORD>

# ---- durability: queues/locks must survive a crash ----
appendonly yes
appendfsync everysec
# RDB as a secondary safety net
save 900 1
save 300 10
save 60 10000

# ---- memory: do NOT evict queue/lock keys ----
maxmemory 2gb
maxmemory-policy noeviction

# ---- replica (uncomment on the replica node) ----
# replicaof <PRIMARY_PRIVATE_IP> 6379
replica-read-only yes
repl-diskless-sync yes

# Redis Sentinel — run 3 instances (app-1, db-1, db-2). Auto-promotes the replica
# if the primary dies; the app's Sentinel-aware client then reconnects to the new
# primary. quorum 2 = two Sentinels must agree before failover (prevents a single
# flaky node from triggering one).

port 26379
bind 127.0.0.1 <THIS_NODE_PRIVATE_IP>
sentinel resolve-hostnames yes

# Monitor the primary. Last arg (2) = quorum.
sentinel monitor aligned-redis <PRIMARY_PRIVATE_IP> 6379 2
sentinel auth-pass aligned-redis <REDIS_PASSWORD>
sentinel down-after-milliseconds aligned-redis 5000
sentinel failover-timeout aligned-redis 30000
sentinel parallel-syncs aligned-redis 1
